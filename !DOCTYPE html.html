<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市区町村訪問マスター V9.5 (Custom Denominator)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
body { font-family: 'Noto Sans JP', sans-serif; background-color: #f0f7ff; color: #0f172a; }
.card { background: white; border-radius: 24px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }

/* 鮮やかで勢いのある配色 */
.bg-vivid-1 { background-color: #ff2d55; color: white; } /* 1年目：ローズ */
.bg-vivid-2 { background-color: #ffcc00; color: #4a3e00; } /* 2年目：イエロー */
.bg-vivid-3 { background-color: #00e676; color: white; } /* 3年目：グリーン */
.bg-vivid-4 { background-color: #00d4ff; color: white; } /* 4年目：鮮やかな水色 */
.bg-vivid-past { background-color: #cbd5e1; color: #475569; } /* 過去：グレー */

.border-vivid-1 { border: 3px solid #ff2d55; }
.border-vivid-2 { border: 3px solid #ffcc00; }
.border-vivid-3 { border: 3px solid #00e676; }
.border-vivid-4 { border: 3px solid #00d4ff; }
.border-vivid-past { border: 3px solid #cbd5e1; }

.label-badge { padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; display: inline-block; }
.scroll-hide::-webkit-scrollbar { width: 6px; }
.scroll-hide::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
</head>
<body class="min-h-screen pb-12">

<header class="bg-white border-b sticky top-0 z-40">
    <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-3xl">🗾</span>
            <h1 class="font-black text-xl tracking-tighter">市区町村訪問マスター <span class="text-xs text-indigo-500 ml-2">V9.5</span></h1>
        </div>
        <div class="flex gap-2" id="header-cycle-switcher"></div>
        <button onclick="appOpenSettings()" class="bg-slate-100 hover:bg-slate-200 p-3 rounded-2xl transition-all">⚙️ 周期・分母設定</button>
    </div>
</header>

<main class="max-w-[1400px] mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-3 space-y-6">
        <div class="card p-6 border-b-8 border-indigo-600">
            <h3 class="font-black text-[10px] mb-6 text-slate-400 tracking-widest uppercase">Record Entry</h3>
            <div class="space-y-4">
                <input list="pref-options" id="form-pref" placeholder="都道府県" class="w-full bg-slate-50 border p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500/20">
                <datalist id="pref-options"></datalist>
                <input type="text" id="form-city" oninput="appCheckDuplicate()" placeholder="市区町村名" class="w-full bg-slate-50 border p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500/20">
                <p id="duplicate-info" class="text-[11px] font-black text-rose-500 min-h-[1.5em] px-1"></p>
                
                <input type="date" id="form-date" class="w-full bg-slate-50 border p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500/20">
                <button onclick="appSaveRecord()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-600 transition-all active:scale-95">💾 記録を保存する</button>
            </div>
        </div>
        <div class="card p-4 h-[500px] overflow-y-auto scroll-hide" id="ui-pref-list"></div>
    </div>

    <div class="lg:col-span-9 space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card p-8">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-[0.2em]">■ 第<span id="ui-disp-cycle">1</span>周期 達成状況</p>
                <span id="ui-stat-rate" class="text-7xl font-black italic tracking-tighter text-slate-900">0.00%</span>
                <div class="w-full bg-slate-100 h-4 rounded-full mt-6 overflow-hidden">
                    <div id="ui-stat-progress" class="bg-indigo-500 h-full transition-all duration-1000"></div>
                </div>
            </div>
            <div class="card p-8 border-l-8 border-emerald-500 flex flex-col justify-center">
                <p class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">全期間 実質訪問数 (重複排除)</p>
                <div class="flex items-baseline gap-2">
                    <span id="ui-unique-count" class="text-8xl font-black text-slate-900 tracking-tighter">0</span>
                    <span id="ui-total-denom" class="text-3xl font-bold text-slate-200 italic">/ 1896</span>
                </div>
            </div>
        </div>

        <div class="card p-8 min-h-[300px]">
            <div class="flex justify-between items-end mb-10 border-b pb-6">
                <div class="flex items-center gap-4">
                    <h3 id="ui-current-pref-name" class="text-5xl font-black text-slate-800 tracking-tighter">訪問地</h3>
                    <button onclick="appTogglePastCity()" id="btn-toggle-past-upper" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[11px] font-black rounded-xl transition-all shadow-sm">👁️ 過去分を隠す</button>
                </div>
                <div class="text-right">
                    <span id="ui-pref-fraction" class="text-xl font-black bg-slate-900 text-white px-6 py-2 rounded-2xl shadow-lg">0 / 0</span>
                </div>
            </div>
            <div id="ui-city-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>
        </div>

        <div class="card p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xs text-slate-400 tracking-widest uppercase italic">Visit Log (Ascending)</h3>
                <button onclick="appTogglePastHistory()" id="btn-toggle-past-lower" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[11px] font-black rounded-xl transition-all shadow-sm">👁️ 過去分を隠す</button>
            </div>
            <div class="overflow-x-auto max-h-[400px] overflow-y-auto scroll-hide">
                <table class="w-full text-xs">
                    <thead class="border-b text-slate-400 sticky top-0 bg-white"><tr>
                        <th class="py-4 px-2 text-left">No.</th>
                        <th class="py-4 px-2 text-left">日付</th>
                        <th class="py-4 px-2 text-left">区分</th>
                        <th class="py-4 px-2 text-left">場所</th>
                        <th class="py-4 px-2 text-right">操作</th>
                    </tr></thead>
                    <tbody id="ui-history-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div id="modal-settings" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md" style="display:none;">
    <div class="bg-white rounded-[40px] w-full max-w-4xl p-10 max-h-[90vh] flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-3xl tracking-tighter italic">⚙️ System Settings</h3>
            <button onclick="document.getElementById('modal-settings').style.display='none'" class="text-slate-300 hover:text-slate-900 text-2xl">✕</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="bg-slate-50 p-6 rounded-3xl">
                <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">周期の基準開始日</label>
                <input type="date" id="cfg-start" class="w-full bg-white border p-4 rounded-2xl font-bold outline-none">
            </div>
            <div class="bg-slate-50 p-6 rounded-3xl">
                <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">全市区町村 総分母</label>
                <input type="number" id="cfg-total-denominator" class="w-full bg-slate-200 border p-4 rounded-2xl font-black outline-none" readonly>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto pr-4 scroll-hide border-t pt-6">
            <div class="flex justify-between items-center mb-4">
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">▼ 各都道府県の分母設定</p>
                <div class="flex gap-2" id="cfg-cycle-switcher"></div>
            </div>
            <div id="cfg-pref-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4"></div>
        </div>

        <div class="pt-8 flex justify-end gap-4">
            <button onclick="appSaveSettings()" class="px-12 py-4 bg-slate-900 text-white rounded-2xl font-black shadow-2xl active:scale-95 transition-all">設定を保存して反映</button>
        </div>
    </div>
</div>

<div id="modal-edit" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md" style="display:none;">
    <div class="bg-white rounded-[40px] w-full max-w-md p-10 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-2xl tracking-tighter italic">✏️ 記録の修正</h3>
            <button onclick="document.getElementById('modal-edit').style.display='none'" class="text-slate-300 hover:text-slate-900 text-2xl">✕</button>
        </div>
        <div class="space-y-4">
            <input type="hidden" id="edit-id">
            <div>
                <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">都道府県</label>
                <input list="pref-options" id="edit-pref" class="w-full bg-slate-50 border p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500/20">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">市区町村名</label>
                <input type="text" id="edit-city" class="w-full bg-slate-50 border p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500/20">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">日付</label>
                <input type="date" id="edit-date" class="w-full bg-slate-50 border p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500/20">
            </div>
            <button onclick="appSaveEdit()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-slate-900 transition-all active:scale-95 mt-4">💾 修正を保存する</button>
        </div>
    </div>
</div>

<script>
// 初期データ
const DEFAULT_PREF_DATA = {"北海道":188,"青森県":40,"岩手県":33,"宮城県":39,"秋田県":25,"山形県":35,"福島県":59,"茨城県":44,"栃木県":25,"群馬県":35,"埼玉県":72,"千葉県":59,"東京都":62,"神奈川県":58,"新潟県":37,"富山県":15,"石川県":19,"福井県":17,"山梨県":27,"長野県":77,"岐阜県":42,"静岡県":43,"愛知県":69,"三重県":29,"滋賀県":19,"京都府":36,"大阪府":72,"兵庫県":49,"奈良県":39,"和歌山県":30,"鳥取県":19,"島根県":19,"岡山県":30,"広島県":30,"山口県":19,"徳島県":24,"香川県":17,"愛媛県":20,"高知県":34,"福岡県":72,"佐賀県":20,"長崎県":21,"熊本県":49,"大分県":18,"宮崎県":26,"鹿児島県":43,"沖縄県":41};
const PREFS = Object.keys(DEFAULT_PREF_DATA);

let appState = { 
    records: [], 
    config: { 
        baseStart: '2022-04-01',
        prefDenominators: [{...DEFAULT_PREF_DATA}, {...DEFAULT_PREF_DATA}, {...DEFAULT_PREF_DATA}, {...DEFAULT_PREF_DATA}] 
    }, 
    activeCycle: 0, 
    currentViewPref: "東京都",
    showPastCityGrid: true,
    showPastHistory: true,
    editingCycle: 0
};

function appInit() {
    const r = localStorage.getItem('visit_v95_recs');
    const c = localStorage.getItem('visit_v95_cfg');
    if(r) appState.records = JSON.parse(r);
    if(c) {
        let parsedCfg = JSON.parse(c);
        if(!Array.isArray(parsedCfg.prefDenominators)) {
            const old = parsedCfg.prefDenominators || {...DEFAULT_PREF_DATA};
            parsedCfg.prefDenominators = [{...old}, {...old}, {...old}, {...old}];
        }
        appState.config = parsedCfg;
    }
    
    PREFS.forEach(p => {
        const o = document.createElement('option');
        o.value = p;
        document.getElementById('pref-options').appendChild(o);
    });
    
    updateActiveCycle();
    appRenderAll();
}

function updateActiveCycle() {
    const d = new Date(); const b = new Date(appState.config.baseStart);
    let diff = (d.getFullYear() - b.getFullYear()) * 12 + (d.getMonth() - b.getMonth());
    if (d.getDate() < b.getDate()) diff--;
    appState.activeCycle = Math.max(0, Math.min(3, Math.floor(Math.floor(diff / 12) / 4)));
}

function getYearInfo(dateStr) {
    const target = new Date(dateStr);
    const base = new Date(appState.config.baseStart);
    const cycleStartYear = base.getFullYear() + (appState.activeCycle * 4);
    const cycleStartDate = new Date(base);
    cycleStartDate.setFullYear(cycleStartYear);

    let diffMonths = (target.getFullYear() - cycleStartDate.getFullYear()) * 12 + (target.getMonth() - cycleStartDate.getMonth());
    if (target.getDate() < cycleStartDate.getDate()) diffMonths--;

    if (diffMonths < 0) return { label: "PAST", class: "bg-vivid-past", border: "border-vivid-past" };
    if (diffMonths < 12) return { label: "1ST YR", class: "bg-vivid-1", border: "border-vivid-1" };
    if (diffMonths < 24) return { label: "2ND YR", class: "bg-vivid-2", border: "border-vivid-2" };
    if (diffMonths < 36) return { label: "3RD YR", class: "bg-vivid-3", border: "border-vivid-3" };
    if (diffMonths < 48) return { label: "4TH YR", class: "bg-vivid-4", border: "border-vivid-4" };
    return { label: "FUTURE", class: "bg-slate-200", border: "border-slate-200" };
}

function appTogglePastCity() {
    appState.showPastCityGrid = !appState.showPastCityGrid;
    const btnU = document.getElementById('btn-toggle-past-upper');
    btnU.textContent = appState.showPastCityGrid ? "👁️ 過去分を隠す" : "🙈 過去分を表示";
    btnU.className = appState.showPastCityGrid 
        ? "px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[11px] font-black rounded-xl transition-all shadow-sm"
        : "px-3 py-1.5 bg-indigo-100 hover:bg-indigo-200 text-indigo-600 text-[11px] font-black rounded-xl transition-all shadow-sm";
    appRenderCityGrid();
}

function appTogglePastHistory() {
    appState.showPastHistory = !appState.showPastHistory;
    const btnL = document.getElementById('btn-toggle-past-lower');
    btnL.textContent = appState.showPastHistory ? "👁️ 過去分を隠す" : "🙈 過去分を表示";
    btnL.className = appState.showPastHistory 
        ? "px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[11px] font-black rounded-xl transition-all shadow-sm"
        : "px-3 py-1.5 bg-indigo-100 hover:bg-indigo-200 text-indigo-600 text-[11px] font-black rounded-xl transition-all shadow-sm";
    appRenderHistory();
}

function appRenderAll() {
    appRenderCycleSwitcher();
    appRenderStats();
    appRenderPrefList();
    appRenderCityGrid();
    appRenderHistory();
    localStorage.setItem('visit_v95_recs', JSON.stringify(appState.records));
    localStorage.setItem('visit_v95_cfg', JSON.stringify(appState.config));
}

function appRenderCycleSwitcher() {
    const ctn = document.getElementById('header-cycle-switcher'); ctn.innerHTML = '';
    for(let i=0; i<4; i++) {
        const btn = document.createElement('button');
        btn.className = `px-6 py-2.5 text-[11px] font-black rounded-2xl transition-all ${appState.activeCycle === i ? 'bg-indigo-600 text-white shadow-xl' : 'text-slate-400 hover:bg-slate-100'}`;
        btn.textContent = `第${i+1}周期`;
        btn.onclick = () => { appState.activeCycle = i; appRenderAll(); };
        ctn.appendChild(btn);
    }
}

function appRenderStats() {
    const currentRecords = appState.records.filter(r => getYearInfo(r.date).label !== "FUTURE");
    const cycleDenom = appState.config.prefDenominators[appState.activeCycle] || appState.config.prefDenominators[0];
    const totalDenom = Object.values(cycleDenom).reduce((a,b)=>a+b, 0);
    
    const cycleUnique = new Set(currentRecords.map(r => `${r.pref}-${r.city}`)).size;
    const allTimeUnique = new Set(appState.records.map(r => `${r.pref}-${r.city}`)).size;
    
    const rate = totalDenom > 0 ? (cycleUnique / totalDenom) * 100 : 0;
    
    document.getElementById('ui-stat-rate').textContent = `${rate.toFixed(2)}%`;
    document.getElementById('ui-stat-progress').style.width = `${Math.min(rate, 100)}%`;
    document.getElementById('ui-unique-count').textContent = allTimeUnique;
    document.getElementById('ui-disp-cycle').textContent = appState.activeCycle + 1;
    document.getElementById('ui-total-denom').textContent = `/ ${totalDenom}`;
}

function appCheckDuplicate() {
    const p = document.getElementById('form-pref').value;
    const c = document.getElementById('form-city').value;
    const info = document.getElementById('duplicate-info');
    info.textContent = "";
    if(!p || !c) return;
    const match = appState.records.find(r => r.pref === p && r.city === c);
    // 「過去訪問アリ 年月日」を復活
    if(match) info.textContent = `⚠️ 過去訪問アリ：${match.date}`;
}

function appRenderPrefList() {
    const ctn = document.getElementById('ui-pref-list'); ctn.innerHTML = '';
    const currentRecords = appState.records.filter(r => getYearInfo(r.date).label !== "FUTURE");
    PREFS.forEach(p => {
        const visitedCount = new Set(currentRecords.filter(r => r.pref === p).map(r => r.city)).size;
        const cycleDenom = appState.config.prefDenominators[appState.activeCycle] || appState.config.prefDenominators[0];
        const denom = cycleDenom[p] || 0;
        const rate = denom > 0 ? (visitedCount / denom) * 100 : 0;
        
        const div = document.createElement('div');
        div.className = `p-4 mb-2 rounded-2xl cursor-pointer transition-all border-2 ${appState.currentViewPref === p ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white border-transparent hover:border-slate-100'}`;
        div.onclick = () => { appState.currentViewPref = p; appRenderAll(); };
        div.innerHTML = `
            <div class="flex justify-between items-center font-black text-[11px] mb-1"><span>${p}</span><span>${rate.toFixed(0)}%</span></div>
            <div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden">
                <div class="bg-indigo-500 h-full" style="width:${rate}%"></div>
            </div>`;
        ctn.appendChild(div);
    });
}

function appRenderCityGrid() {
    const p = appState.currentViewPref;
    const ctn = document.getElementById('ui-city-grid'); ctn.innerHTML = '';
    document.getElementById('ui-current-pref-name').textContent = p;
    
    const currentRecords = appState.records.filter(r => getYearInfo(r.date).label !== "FUTURE");
    const prefRecs = currentRecords.filter(r => r.pref === p);
    const uniqueCities = [...new Set(prefRecs.map(v => v.city))];
    const cycleDenom = appState.config.prefDenominators[appState.activeCycle] || appState.config.prefDenominators[0];
    const denom = cycleDenom[p] || 0;
    
    let displayedCount = 0;
    uniqueCities.forEach(city => {
        const latest = prefRecs.filter(v => v.city === city).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
        const info = getYearInfo(latest.date);
        
        if (!appState.showPastCityGrid && info.label === "PAST") return;
        
        displayedCount++;
        const div = document.createElement('div');
        div.className = `p-5 rounded-[24px] text-center bg-white shadow-sm border-2 ${info.border}`;
        div.innerHTML = `<div class="text-[12px] font-black mb-3 text-slate-800">${city}</div><div class="label-badge ${info.class}">${info.label}</div>`;
        ctn.appendChild(div);
    });

    document.getElementById('ui-pref-fraction').textContent = `${displayedCount} / ${denom}`;
}

function appRenderHistory() {
    const tb = document.getElementById('ui-history-body'); tb.innerHTML = '';
    const currentRecords = appState.records.filter(r => getYearInfo(r.date).label !== "FUTURE");
    const sorted = [...currentRecords].sort((a,b) => new Date(a.date) - new Date(b.date)); // 古い順
    let displayIdx = 1;
    sorted.forEach((r) => {
        const info = getYearInfo(r.date);
        
        if (!appState.showPastHistory && info.label === "PAST") return;
        
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors";
        tr.innerHTML = `
            <td class="py-4 px-2 font-mono text-slate-300 font-bold">#${displayIdx++}</td>
            <td class="py-4 px-2 font-bold text-slate-600">${r.date}</td>
            <td class="py-4 px-2"><span class="label-badge ${info.class}">${info.label}</span></td>
            <td class="py-4 px-2 font-black text-slate-900">${r.pref} ${r.city}</td>
            <td class="py-4 px-2 text-right">
                <button onclick="appOpenEdit(${r.id})" class="text-slate-300 hover:text-indigo-500 font-black text-lg p-2 mr-1">✏️</button>
                <button onclick="appDel(${r.id})" class="text-slate-300 hover:text-rose-500 font-black text-lg p-2">✕</button>
            </td>`;
        tb.appendChild(tr);
    });
}

function appSaveRecord() {
    const p = document.getElementById('form-pref').value.trim();
    const c = document.getElementById('form-city').value.trim();
    const d = document.getElementById('form-date').value;
    if(!p || !c || !d) return alert("全ての項目を入力してください");
    appState.records.push({ id: Date.now(), pref: p, city: c, date: d });
    appState.currentViewPref = p;
    document.getElementById('form-city').value = "";
    appRenderAll();
}

function appDel(id) { if(confirm('この記録を削除しますか？')) { appState.records = appState.records.filter(x => x.id !== id); appRenderAll(); } }

function appOpenEdit(id) {
    const r = appState.records.find(x => x.id === id);
    if(!r) return;
    document.getElementById('edit-id').value = r.id;
    document.getElementById('edit-pref').value = r.pref;
    document.getElementById('edit-city').value = r.city;
    document.getElementById('edit-date').value = r.date;
    document.getElementById('modal-edit').style.display = 'flex';
}

function appSaveEdit() {
    const id = parseInt(document.getElementById('edit-id').value);
    const p = document.getElementById('edit-pref').value.trim();
    const c = document.getElementById('edit-city').value.trim();
    const d = document.getElementById('edit-date').value;
    if(!p || !c || !d) return alert("全ての項目を入力してください");
    const idx = appState.records.findIndex(x => x.id === id);
    if(idx !== -1) {
        appState.records[idx].pref = p;
        appState.records[idx].city = c;
        appState.records[idx].date = d;
        document.getElementById('modal-edit').style.display = 'none';
        appState.currentViewPref = p;
        appRenderAll();
    }
}

function appOpenSettings() {
    document.getElementById('modal-settings').style.display = 'flex';
    document.getElementById('cfg-start').value = appState.config.baseStart;
    appState.editingCycle = appState.activeCycle;
    appRenderCfgGrid();
}

function appRenderCfgGrid() {
    const switcher = document.getElementById('cfg-cycle-switcher');
    if (switcher) {
        switcher.innerHTML = '';
        for(let i=0; i<4; i++) {
            const btn = document.createElement('button');
            btn.className = `px-3 py-1.5 text-[11px] font-black rounded-lg transition-all ${appState.editingCycle === i ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-200 bg-slate-100'}`;
            btn.textContent = `第${i+1}周期`;
            btn.type = "button";
            btn.onclick = () => { appState.editingCycle = i; appRenderCfgGrid(); };
            switcher.appendChild(btn);
        }
    }

    const ctn = document.getElementById('cfg-pref-grid'); ctn.innerHTML = '';
    let total = 0;
    const currentEditDenoms = appState.config.prefDenominators[appState.editingCycle] || appState.config.prefDenominators[0];
    PREFS.forEach(p => {
        const val = currentEditDenoms[p] || 0;
        total += val;
        const div = document.createElement('div');
        div.innerHTML = `
            <label class="text-[9px] font-black text-slate-400 block mb-1 truncate">${p}</label>
            <input type="number" value="${val}" onchange="appUpdateDenom('${p}', this.value)" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-xs font-black outline-none focus:border-indigo-500">`;
        ctn.appendChild(div);
    });
    document.getElementById('cfg-total-denominator').value = total;
}

function appUpdateDenom(p, v) {
    if (!appState.config.prefDenominators[appState.editingCycle]) {
        appState.config.prefDenominators[appState.editingCycle] = {...DEFAULT_PREF_DATA};
    }
    appState.config.prefDenominators[appState.editingCycle][p] = parseInt(v) || 0;
    appRenderCfgGrid();
}

function appSaveSettings() {
    appState.config.baseStart = document.getElementById('cfg-start').value;
    document.getElementById('modal-settings').style.display = 'none';
    updateActiveCycle();
    appRenderAll();
}

window.onload = appInit;
</script>
</body>
</html>
